site_name: Household Platform
site_description: Platform-wide documentation for the Household project

theme:
  name: material
  palette:
    scheme: slate
    primary: indigo
    accent: indigo
  features:
    - navigation.instant
    - navigation.sections
    - navigation.expand
    - search.highlight
    - content.code.copy

nav:
  - Overview: index.md
  - Features:
    - Authentication: features/auth.md
    - Members: features/members.md
    - Savings Goals: features/goals.md
    - Investments: features/investments.md
    - Finances: features/finances.md
  - Roadmap: roadmap.md
  - Developers:
    - Architecture: architecture.md
    - Dashboard Architecture: dashboard-architecture.md
    - Conventions: conventions.md
    - New Service Checklist: new-service-checklist.md
    - Repositories:
      - hh-shared: repositories/hh-shared.md
      - hh-auth: repositories/hh-auth.md
      - hh-users: repositories/hh-users.md
      - hh-goals: repositories/hh-goals.md
      - hh-investments: repositories/hh-investments.md
      - hh-finances: repositories/hh-finances.md

markdown_extensions:
  - tables
  - admonition
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
