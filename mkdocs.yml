site_name: Household Platform
site_description: Platform-wide documentation for the Household project

theme:
  name: material
  palette:
    scheme: slate
    primary: indigo
    accent: indigo
  features:
    - navigation.instant
    - navigation.sections
    - navigation.expand
    - search.highlight
    - content.code.copy

nav:
  - Home: index.md
  - Architecture: architecture.md
  - Conventions: conventions.md
  - CI/CD: ci-cd.md
  - Environment Variables: environment-variables.md
  - Seed Data: seed-data.md
  - New Service Checklist: new-service-checklist.md

markdown_extensions:
  - tables
  - admonition
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
